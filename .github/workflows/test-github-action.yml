on: push

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: npm install
      - run: npm run build
      - name: Sauvegarde du cache
        uses: actions/cache/save@v5
        with:
          path: |
            node_modules
            .next
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v6
      - uses: cypress-io/github-action@v7
        with:
          start: npm run start
          build: npm run build







